<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPGシナリオチャート</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- プロジェクト一覧画面 -->
    <div id="project-list-screen" class="screen">
        <div class="header">
            <h1>TRPGシナリオチャート</h1>
            <div class="header-buttons">
                <button id="new-project-btn" class="primary-btn">新規プロジェクト</button>
                <button id="import-project-btn" class="secondary-btn">インポート</button>
            </div>
        </div>
        <div class="project-list" id="project-list"></div>
    </div>

    <!-- フローチャート編集画面 -->
    <div id="chart-screen" class="screen hidden">
        <div class="header">
            <div class="header-left">
                <button id="back-to-projects-btn" class="secondary-btn">← 一覧</button>
                <h1 id="project-title">プロジェクト名</h1>
            </div>
            <div class="header-buttons">
                <button id="add-scene-btn" class="primary-btn">＋ ノード追加</button>
                <button id="manage-characters-btn" class="secondary-btn">👥 キャラクター管理</button>
                <button id="auto-layout-btn" class="secondary-btn">自動整列</button>
                <button id="export-cocofolia-btn" class="secondary-btn">ココフォリア出力</button>
                <button id="export-text-btn" class="secondary-btn">シナリオテキスト</button>
                <button id="export-characters-text-btn" class="secondary-btn">キャラクターテキスト</button>
            </div>
        </div>
        <div id="canvas-container">
            <svg id="canvas" width="3000" height="3000">
                <defs>
                    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="#555" />
                    </marker>
                    <marker id="arrowhead-green" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
                        <polygon points="0 0, 12 4, 0 8" fill="#4CAF50" />
                    </marker>
                </defs>
                <g id="connections-layer"></g>
                <g id="nodes-layer"></g>
            </svg>
        </div>
        <!-- 操作ヒント -->
        <div id="hint-bar">
            <span id="hint-text">ノードをドラッグで移動 ／ 緑の丸をクリックで接続 ／ ノードをクリックで編集 ／ マウスホイールでズーム</span>
        </div>
    </div>

    <!-- ノード編集モーダル -->
    <div id="node-editor-modal" class="modal hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2 id="editor-title">ノード編集</h2>
                <button id="close-editor-btn" class="close-btn">×</button>
            </div>
            
            <!-- タブ切り替え -->
            <div class="node-editor-tabs">
                <button class="node-editor-tab active" data-tab="edit">✏️ 編集</button>
                <button class="node-editor-tab" data-tab="assist">🔧 補助ツール</button>
            </div>
            
            <!-- 編集タブ -->
            <div class="node-editor-tab-panel active" id="edit-panel">
            <div class="modal-body">
                <!-- Scenes設定 -->
                <div class="section-header">📍 Scenes（シーン）設定</div>
                <div class="form-group">
                    <label>シーン名</label>
                    <input type="text" id="scene-name" placeholder="例：導入、街中、病院">
                </div>
                <div class="form-group">
                    <label>背景色</label>
                    <div class="color-picker">
                        <input type="color" id="scene-bg-color" value="#888888">
                        <input type="text" id="scene-bg-color-text" placeholder="#888888" maxlength="7" style="width: 100px;">
                    </div>
                </div>
                
                <!-- 作業メモ（ココフォリア反映なし） -->
                <div class="section-header">📝 作業メモ（ココフォリア反映なし）</div>
                <div class="form-group">
                    <label>登場キャラクターなどのメモ</label>
                    <textarea id="work-memo" rows="3" placeholder="このシーンの登場キャラクターや注意点など（ココフォリアには出力されません）"></textarea>
                </div>

                <!-- Scenes本文 -->
                <div class="section-header">📄 Scenes本文</div>
                <div class="form-group">
                    <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px;">
                        <input type="checkbox" id="scene-also-as-item" style="width:auto;">
                        Itemとしても出力する
                    </label>
                    <textarea id="scene-content" rows="8" placeholder="このシーンの描写や情報を記述してください"></textarea>
                </div>

                <!-- 追加テキストエリア -->
                <div class="section-header">➕ 追加コンテンツ</div>
                <div id="additional-contents">
                    <!-- 動的に追加されるNotes/Items/Memo -->
                </div>
                <div class="add-content-buttons">
                    <button type="button" id="add-note-btn" class="secondary-btn">＋ Notesを追加</button>
                    <button type="button" id="add-item-btn" class="secondary-btn">＋ Itemsを追加</button>
                    <button type="button" id="add-memo-btn" class="secondary-btn">＋ メモを追加</button>
                </div>

                <!-- ノードの色 -->
                <div class="section-header">🎨 ノードの色（フローチャート表示用）</div>
                <div class="form-group">
                    <div class="color-picker">
                        <input type="color" id="node-color" value="#ffffff">
                        <div class="color-presets">
                            <span class="color-preset" data-color="#ffffff" style="background:#ffffff" title="白"></span>
                            <span class="color-preset" data-color="#fff9c4" style="background:#fff9c4" title="黄"></span>
                            <span class="color-preset" data-color="#f8bbd0" style="background:#f8bbd0" title="ピンク"></span>
                            <span class="color-preset" data-color="#c8e6c9" style="background:#c8e6c9" title="緑"></span>
                            <span class="color-preset" data-color="#bbdefb" style="background:#bbdefb" title="青"></span>
                            <span class="color-preset" data-color="#e1bee7" style="background:#e1bee7" title="紫"></span>
                            <span class="color-preset" data-color="#ffccbc" style="background:#ffccbc" title="オレンジ"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 補助ツールタブ -->
            <div class="node-editor-tab-panel" id="assist-panel">
                <div class="modal-body">
                    <!-- 技能・記法タブ -->
                    <div class="assist-tabs">
                        <button class="assist-tab active" data-subtab="skills">技能</button>
                        <button class="assist-tab" data-subtab="notation">記法</button>
                    </div>
                    
                    <!-- バージョン選択 -->
                    <div class="version-selector">
                        <button class="version-btn active" data-version="common">6版・7版共通</button>
                        <button class="version-btn" data-version="v6">6版のみ</button>
                        <button class="version-btn" data-version="v7">7版のみ</button>
                        <button class="version-btn" data-version="custom">カスタム</button>
                    </div>
                    
                    <!-- 技能ボタンパネル -->
                    <div class="assist-subtab-panel active" id="skills-panel">
                        <div class="button-grid" id="skills-buttons"></div>
                    </div>
                    
                    <!-- 記法ボタンパネル -->
                    <div class="assist-subtab-panel" id="notation-panel">
                        <div class="button-grid" id="notation-buttons"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="delete-node-btn" class="danger-btn">削除</button>
                <button id="save-node-btn" class="primary-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- 矢印ラベル編集モーダル -->
    <div id="connection-editor-modal" class="modal hidden">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>矢印ラベル編集</h2>
                <button id="close-connection-editor-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ラベル</label>
                    <input type="text" id="connection-label" placeholder="例：YES / 協力する / 拒否する">
                </div>
            </div>
            <div class="modal-footer">
                <button id="delete-connection-btn" class="danger-btn">削除</button>
                <button id="save-connection-btn" class="primary-btn">保存</button>
            </div>
        </div>
    </div>

    <!-- キャラクター管理モーダル -->
    <div id="characters-modal" class="modal hidden">
        <div class="modal-content large">
            <div class="modal-header">
                <h2>キャラクター管理</h2>
                <button id="close-characters-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div id="characters-list">
                    <!-- キャラクター一覧 -->
                </div>
                <button type="button" id="add-character-btn" class="primary-btn" style="margin-top: 10px;">＋ キャラクター追加</button>
            </div>
            <div class="modal-footer">
                <button id="close-characters-done-btn" class="primary-btn">完了</button>
            </div>
        </div>
    </div>

    <!-- 新規プロジェクトモーダル -->
    <div id="new-project-modal" class="modal hidden">
        <div class="modal-content small">
            <div class="modal-header">
                <h2>新規プロジェクト</h2>
                <button id="close-new-project-btn" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>プロジェクト名</label>
                    <input type="text" id="new-project-name" placeholder="例：病院シナリオ">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-new-project-btn" class="secondary-btn">キャンセル</button>
                <button id="create-project-btn" class="primary-btn">作成</button>
            </div>
        </div>
    </div>

    <input type="file" id="import-file-input" accept=".json" style="display:none;">
    <!-- JSZipは使用時に動的ロードします -->
    <script src="app.js"></script>
</body>
</html>
